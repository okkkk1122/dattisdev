services:
  postgres:
    image: postgres:15-alpine
    container_name: enterprise_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-enterprise_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - enterprise_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-enterprise_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: enterprise_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - enterprise_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enterprise_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-enterprise_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SMTP_HOST: ${SMTP_HOST:-haraka}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-}
      HARAKA_INBOUND_SECRET: ${HARAKA_INBOUND_SECRET}
      HARAKA_PUBLIC_SMTP_PORT: ${HARAKA_PUBLIC_SMTP_PORT:-2525}
      HARAKA_PUBLIC_SUBMISSION_PORT: ${HARAKA_PUBLIC_SUBMISSION_PORT:-2587}
      SERVER_IP: ${SERVER_IP:-}
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - enterprise_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        INTERNAL_API_URL: ${INTERNAL_API_URL}
    container_name: enterprise_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      INTERNAL_API_URL: ${INTERNAL_API_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
      PORT: 3001
      HOSTNAME: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - enterprise_network

  haraka:
    image: instrumentisto/haraka:latest
    container_name: enterprise_haraka
    restart: unless-stopped
    env_file: .env
    ports:
      - "${HARAKA_PUBLIC_SMTP_PORT:-2525}:25"
      - "${HARAKA_PUBLIC_SUBMISSION_PORT:-2587}:587"
      - "25:25"
    volumes:
      - ./docker/haraka/config:/etc/haraka/config
      - ./docker/haraka/plugins:/etc/haraka/plugins:ro
      - haraka_queue:/etc/haraka/queue
    environment:
      HARAKA_INBOUND_URL: http://backend:3001/api/email/inbound
      HARAKA_INBOUND_SECRET: ${HARAKA_INBOUND_SECRET}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-dattisdev.ir}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - enterprise_network

  nginx:
    image: nginx:alpine
    container_name: enterprise_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - enterprise_network
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: dattisdev_postgres_data
  redis_data:
    name: dattisdev_redis_data
  backend_data:
    name: dattisdev_backend_data
  haraka_queue:
    name: dattisdev_haraka_queue

networks:
  enterprise_network:
    name: dattisdev-network
    driver: bridge
  dokploy-network:
    external: true
