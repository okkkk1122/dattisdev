services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: enterprise_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-enterprise_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - enterprise_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: enterprise_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - enterprise_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enterprise_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      FRONTEND_URL: http://localhost:3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-enterprise_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SMTP_HOST: ${SMTP_HOST:-haraka}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-info@dattisdev.com}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-info@dattisdev.com}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-dattisdev.com}
      HARAKA_INBOUND_SECRET: ${HARAKA_INBOUND_SECRET:-change-me-inbound-secret}
    ports:
      - "3003:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - enterprise_network
    command: npm run start:dev

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: enterprise_frontend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: http://localhost:3003/api
      INTERNAL_API_URL: http://backend:3001
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3002
      PORT: 3001
      HOSTNAME: 0.0.0.0
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - enterprise_network
    command: npm run dev -- -H 0.0.0.0

  # Haraka SMTP Server (Node.js)
  haraka:
    image: instrumentisto/haraka:latest
    container_name: enterprise_haraka
    ports:
      - "2525:25"
      - "2587:587"
    volumes:
      - ./docker/haraka/config:/etc/haraka/config
      - ./docker/haraka/plugins:/etc/haraka/plugins:ro
      - haraka_queue:/etc/haraka/queue
    environment:
      HARAKA_INBOUND_URL: http://backend:3001/api/email/inbound
      HARAKA_INBOUND_SECRET: ${HARAKA_INBOUND_SECRET:-change-me-inbound-secret}
    depends_on:
      - backend
    networks:
      - enterprise_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: enterprise_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - enterprise_network

volumes:
  postgres_data:
  redis_data:
  backend_data:
  haraka_queue:

networks:
  enterprise_network:
    driver: bridge

